services:
  - type: web
    name: lecturemind-ai
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: bash render-build.sh
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 120 --workers 1
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: NODE_VERSION
        value: "20"
      - key: GROQ_API_KEY
        sync: false
